<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard – BLUELIGHT ACADEMY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060818;
  --surface: #0d1128;
  --surface2: #141832;
  --border: #1e2545;
  --accent: #4f8ef7;
  --accent2: #7eb8ff;
  --accent3: #00d4ff;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --purple: #8b5cf6;
  --text: #e8edf8;
  --muted: #6b7ba0;
  --radius: 14px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

a { color: inherit; }

/* ═══════ HEADER ═══════ */
.admin-header {
  width: 100%;
  background: linear-gradient(135deg, #080c24 0%, #0e1535 40%, #070c20 100%);
  border-bottom: 1px solid rgba(79,142,247,.3);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.admin-header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.25rem;
  font-weight: 900;
  background: linear-gradient(90deg, #c8d8ff 0%, #7eb8ff 50%, #00d4ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.admin-header .sub { font-size: .78rem; color: var(--muted); margin-top: 2px; }

.btn {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: .85rem;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { transform: translateY(-1px); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-primary { background: linear-gradient(135deg, #1a56db, #4f8ef7); border-color: transparent; box-shadow: 0 0 16px rgba(79,142,247,.35); }
.btn-danger  { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); color: #fca5a5; }
.btn-danger:hover { background: rgba(239,68,68,.28); }
.btn-ghost   { background: transparent; }
.btn-sm { padding: 6px 12px; font-size: .78rem; }

/* ═══════ LOGIN ═══════ */
.login-wrap {
  min-height: calc(100vh - 80px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-card {
  background: linear-gradient(135deg, #0d1128, #101a35);
  border: 1px solid rgba(79,142,247,.3);
  border-radius: 20px;
  padding: 40px 36px;
  max-width: 380px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(79,142,247,.1);
}
.login-card h2 {
  font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800;
  margin-bottom: 6px;
}
.login-card p.hint { font-size: .82rem; color: var(--muted); margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: .88rem;
  outline: none;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,.15); }
.field textarea { resize: vertical; min-height: 70px; }
.error-msg { color: var(--red); font-size: .82rem; margin-top: 4px; display: none; }
.error-msg.show { display: block; }
.success-msg { color: var(--green); font-size: .82rem; margin-top: 4px; display: none; }
.success-msg.show { display: block; }

/* ═══════ DASHBOARD ═══════ */
.dash-wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; display: none; }
.dash-wrap.show { display: block; }
.dash-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 12px; flex-wrap: wrap; }
.dash-toolbar .count { font-size: .85rem; color: var(--muted); }

.q-list { display: flex; flex-direction: column; gap: 12px; }
.q-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.q-item .q-head { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
.q-item .q-title { font-size: .92rem; font-weight: 500; line-height: 1.5; }
.q-item .q-actions { display: flex; gap: 8px; flex-shrink: 0; }
.q-item .opts { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
.opt-chip {
  font-size: .76rem; padding: 4px 10px; border-radius: 99px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
}
.opt-chip.is-answer { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.4); color: var(--green); font-weight: 600; }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
  border: 1px dashed var(--border); border-radius: var(--radius);
}

/* ═══════ MODAL / FORM ═══════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: linear-gradient(135deg, #0d1128, #141e3c);
  border: 1px solid rgba(79,142,247,.35);
  border-radius: 18px; padding: 28px;
  max-width: 520px; width: 100%; max-height: 88vh; overflow-y: auto;
}
.modal-box h3 { font-family: 'Syne', sans-serif; font-size: 1.15rem; margin-bottom: 18px; }
.option-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.option-row input { flex: 1; }
.option-row .remove-opt { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1rem; padding: 4px 8px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }

.loading-spin {
  display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 18px; font-size: .85rem; box-shadow: 0 10px 40px rgba(0,0,0,.5);
  opacity: 0; transform: translateY(10px); transition: all .25s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: rgba(239,68,68,.5); color: #fca5a5; }
.toast.ok { border-color: rgba(34,197,94,.5); color: #86efac; }
</style>
</head>
<body>

<header class="admin-header">
  <div>
    <h1>🛠 Admin Dashboard</h1>
    <div class="sub">BLUELIGHT ACADEMY · MCQ Question Bank</div>
  </div>
  <button class="btn btn-ghost" id="logoutBtn" style="display:none" onclick="logout()">↩ Log out</button>
</header>

<!-- ═══════ LOGIN SCREEN ═══════ -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <h2>Admin Login</h2>
    <p class="hint">Sign in to manage the question bank.</p>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <div class="error-msg" id="loginError"></div>
      <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:6px">Log in</button>
    </form>
  </div>
</div>

<!-- ═══════ DASHBOARD ═══════ -->
<div class="dash-wrap" id="dashScreen">
  <div class="dash-toolbar">
    <div class="count" id="qCount">Loading questions…</div>
    <button class="btn btn-primary" onclick="openForm()">＋ Add question</button>
  </div>
  <div class="q-list" id="qList"></div>
</div>

<!-- ═══════ ADD/EDIT MODAL ═══════ -->
<div class="modal-overlay" id="formModal">
  <div class="modal-box">
    <h3 id="formTitle">Add question</h3>
    <form id="qForm">
      <input type="hidden" id="qId" />
      <div class="field">
        <label for="qText">Question</label>
        <textarea id="qText" required></textarea>
      </div>
      <div class="field">
        <label>Options (mark the correct one)</label>
        <div id="optionsWrap"></div>
        <button type="button" class="btn btn-sm btn-ghost" onclick="addOptionRow()" style="margin-top:4px">＋ Add option</button>
      </div>
      <div class="field">
        <label for="qImage">Image URL <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="text" id="qImage" placeholder="https://…" />
      </div>
      <div class="field">
        <label for="qCaption">Image caption <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="text" id="qCaption" />
      </div>
      <div class="error-msg" id="formError"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeForm()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="formSubmitBtn">Save question</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════ SESSION ══════════ */
function getToken()   { return sessionStorage.getItem('admin_token'); }
function setToken(t)  { sessionStorage.setItem('admin_token', t); }
function clearToken() { sessionStorage.removeItem('admin_token'); }

function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': `Bearer ${t}` } : {};
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type || ''}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ══════════ ESCAPE HELPER ══════════ */
function escapeHTML(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ══════════ LOGIN ══════════ */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errBox.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spin"></span>Signing in…';

  try {
    const res = await fetch('/.netlify/functions/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    setToken(data.token);
    enterDashboard();
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
});

function logout() {
  clearToken();
  document.getElementById('dashScreen').classList.remove('show');
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('password').value = '';
}

function enterDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashScreen').classList.add('show');
  document.getElementById('logoutBtn').style.display = 'inline-block';
  loadQuestions();
}

/* If a token is already stored (page refresh), skip straight to the dashboard.
   The very first API call will bounce us back to login if it's actually expired. */
if (getToken()) enterDashboard();

/* ══════════ LOAD + RENDER QUESTIONS ══════════ */
let currentQuestions = [];

async function loadQuestions() {
  const list = document.getElementById('qList');
  const countEl = document.getElementById('qCount');
  try {
    const res = await fetch('/.netlify/functions/questions');
    if (!res.ok) throw new Error('Failed to load questions');
    currentQuestions = await res.json();
    renderList();
  } catch (err) {
    countEl.textContent = '';
    list.innerHTML = `<div class="empty-state">⚠ Couldn't load questions: ${escapeHTML(err.message)}</div>`;
  }
}

function renderList() {
  const list = document.getElementById('qList');
  const countEl = document.getElementById('qCount');
  countEl.textContent = `${currentQuestions.length} question${currentQuestions.length === 1 ? '' : 's'} in the bank`;

  if (currentQuestions.length === 0) {
    list.innerHTML = `<div class="empty-state">No questions yet. Click "＋ Add question" to create the first one.</div>`;
    return;
  }

  list.innerHTML = currentQuestions.map((q, i) => `
    <div class="q-item">
      <div class="q-head">
        <div class="q-title">Q${i + 1}. ${escapeHTML(q.question)}</div>
        <div class="q-actions">
          <button class="btn btn-sm btn-ghost" onclick="openForm('${q.id}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteQuestion('${q.id}')">Delete</button>
        </div>
      </div>
      <div class="opts">
        ${q.options.map(opt => `
          <span class="opt-chip ${opt === q.answer ? 'is-answer' : ''}">${opt === q.answer ? '✓ ' : ''}${escapeHTML(opt)}</span>
        `).join('')}
      </div>
    </div>
  `).join('');
}

/* ══════════ ADD / EDIT FORM ══════════ */
function addOptionRow(value) {
  const wrap = document.getElementById('optionsWrap');
  const row = document.createElement('div');
  row.className = 'option-row';
  row.innerHTML = `
    <input type="radio" name="correctOption" title="Mark as correct answer" />
    <input type="text" class="opt-input" placeholder="Option text" value="${escapeHTML(value || '')}" required />
    <button type="button" class="remove-opt" onclick="this.closest('.option-row').remove()" title="Remove option">✕</button>
  `;
  wrap.appendChild(row);
}

function openForm(id) {
  const modal = document.getElementById('formModal');
  const title = document.getElementById('formTitle');
  const wrap = document.getElementById('optionsWrap');
  document.getElementById('formError').classList.remove('show');
  wrap.innerHTML = '';
  document.getElementById('qId').value = id || '';

  if (id) {
    const q = currentQuestions.find(x => x.id === id);
    title.textContent = 'Edit question';
    document.getElementById('qText').value = q.question;
    document.getElementById('qImage').value = q.image || '';
    document.getElementById('qCaption').value = q.imageCaption || '';
    q.options.forEach(opt => addOptionRow(opt));
    // check the radio matching the correct answer
    setTimeout(() => {
      const rows = wrap.querySelectorAll('.option-row');
      rows.forEach(row => {
        const input = row.querySelector('.opt-input');
        const radio = row.querySelector('input[type=radio]');
        if (input.value === q.answer) radio.checked = true;
      });
    }, 0);
  } else {
    title.textContent = 'Add question';
    document.getElementById('qText').value = '';
    document.getElementById('qImage').value = '';
    document.getElementById('qCaption').value = '';
    addOptionRow(); addOptionRow(); addOptionRow(); addOptionRow();
  }
  modal.classList.add('open');
}

function closeForm() {
  document.getElementById('formModal').classList.remove('open');
}

document.getElementById('qForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errBox = document.getElementById('formError');
  errBox.classList.remove('show');

  const id = document.getElementById('qId').value;
  const question = document.getElementById('qText').value.trim();
  const image = document.getElementById('qImage').value.trim();
  const imageCaption = document.getElementById('qCaption').value.trim();

  const rows = Array.from(document.querySelectorAll('#optionsWrap .option-row'));
  const options = rows.map(r => r.querySelector('.opt-input').value.trim()).filter(Boolean);
  const checkedRow = rows.find(r => r.querySelector('input[type=radio]').checked);
  const answer = checkedRow ? checkedRow.querySelector('.opt-input').value.trim() : '';

  if (options.length < 2) return showFormError('Add at least 2 options');
  if (!answer) return showFormError('Select which option is correct');

  const payload = { question, options, answer, image, imageCaption };
  const btn = document.getElementById('formSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spin"></span>Saving…';

  try {
    const url = id ? `/.netlify/functions/questions?id=${encodeURIComponent(id)}` : '/.netlify/functions/questions';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.status === 401) { showToast('Session expired — please log in again', 'error'); logout(); return; }
    if (!res.ok) throw new Error(data.error || 'Save failed');

    closeForm();
    showToast(id ? 'Question updated' : 'Question added', 'ok');
    loadQuestions();
  } catch (err) {
    showFormError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save question';
  }
});

function showFormError(msg) {
  const errBox = document.getElementById('formError');
  errBox.textContent = msg;
  errBox.classList.add('show');
}

/* ══════════ DELETE ══════════ */
async function deleteQuestion(id) {
  if (!confirm('Delete this question? This cannot be undone.')) return;
  try {
    const res = await fetch(`/.netlify/functions/questions?id=${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: authHeaders(),
    });
    if (res.status === 401) { showToast('Session expired — please log in again', 'error'); logout(); return; }
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error || 'Delete failed');
    }
    showToast('Question deleted', 'ok');
    loadQuestions();
  } catch (err) {
    showToast(err.message, 'error');
  }
}
</script>
</body>
</html>
